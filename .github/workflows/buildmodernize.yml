      - name: Create PkgInfo
        run: |
          APP_NAME="Modernize"
          printf 'APPL????' > Payload/${APP_NAME}.app/PkgInfo

      - name: Create IPA
        run: |
          APP_NAME="Modernize"
          zip -r ${APP_NAME}.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Modernize-Final-Working
          path: Modernize.ipa
