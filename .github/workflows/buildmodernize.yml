name: Build Modernize Browser (Download 15+ JS, Combine to One)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify legacy-transpiler.js exists
        run: |
          if [ ! -f patches/legacy-transpiler.js ]; then
            echo "ERROR: patches/legacy-transpiler.js not found!"
            echo "You MUST upload your 274KB legacy-transpiler.js to the patches/ folder"
            exit 1
          fi
          echo "legacy-transpiler.js size: $(wc -c < patches/legacy-transpiler.js) bytes"

      - name: Create directory structure
        run: mkdir -p Payload/Modernize.app

      - name: Download all required polyfills (15+ files) - WILL BE COMBINED INTO ONE
        run: |
          mkdir -p patches/downloads
          
          echo "Downloading core-js (ES2020-2025) - 600KB..."
          curl -L -o patches/downloads/core-js.js https://cdn.jsdelivr.net/npm/core-js@3/actual/minified.js
          
          echo "Downloading regenerator-runtime (async/await) - 50KB..."
          curl -L -o patches/downloads/regenerator.js https://cdn.jsdelivr.net/npm/regenerator-runtime@0.14.1/runtime.min.js
          
          echo "Downloading whatwg-fetch (fetch API) - 15KB..."
          curl -L -o patches/downloads/fetch.js https://cdn.jsdelivr.net/npm/whatwg-fetch@3.6.20/dist/fetch.umd.js
          
          echo "Downloading abortcontroller-polyfill - 8KB..."
          curl -L -o patches/downloads/abortcontroller.js https://cdn.jsdelivr.net/npm/abortcontroller-polyfill@1.7.5/dist/abortcontroller-polyfill-only.js
          
          echo "Downloading urlpattern-polyfill - 30KB..."
          curl -L -o patches/downloads/urlpattern.js https://cdn.jsdelivr.net/npm/urlpattern-polyfill@10.0.0/index.js
          
          echo "Downloading intersection-observer - 10KB..."
          curl -L -o patches/downloads/intersection-observer.js https://cdn.jsdelivr.net/npm/intersection-observer@0.12.2/intersection-observer.js
          
          echo "Downloading resize-observer-polyfill - 12KB..."
          curl -L -o patches/downloads/resize-observer.js https://cdn.jsdelivr.net/npm/resize-observer-polyfill@1.5.1/dist/ResizeObserver.js
          
          echo "Downloading web-streams-polyfill - 35KB..."
          curl -L -o patches/downloads/streams.js https://cdn.jsdelivr.net/npm/web-streams-polyfill@4.0.0/dist/polyfill.js
          
          echo "Downloading structured-clone-polyfill - 8KB..."
          curl -L -o patches/downloads/structured-clone.js https://cdn.jsdelivr.net/npm/structured-clone-polyfill@1.0.1/src/structuredClone.js
          
          echo "Downloading web-animations-js - 420KB..."
          curl -L -o patches/downloads/web-animations.js https://cdn.jsdelivr.net/npm/web-animations-js@2.3.2/web-animations.min.js
          
          echo "Downloading promise-polyfill - 8KB..."
          curl -L -o patches/downloads/promise.js https://cdn.jsdelivr.net/npm/promise-polyfill@8.3.0/dist/polyfill.min.js
          
          echo "All 11+ polyfills downloaded successfully"
          ls -la patches/downloads/

      - name: COMBINE all polyfills into ONE file (Critical - prevents iOS 15 injection bug)
        run: |
          # Create a single combined polyfills file by concatenating in correct order
          echo "// ============================================================" > patches/1-polyfills-combined.js
          echo "// COMBINED POLYFILLS - All 15+ files combined into ONE" >> patches/1-polyfills-combined.js
          echo "// This prevents iOS 15's WKUserScript injection corruption" >> patches/1-polyfills-combined.js
          echo "// Order matters: core-js first, then polyfills that depend on it" >> patches/1-polyfills-combined.js
          echo "// ============================================================" >> patches/1-polyfills-combined.js
          echo "" >> patches/1-polyfills-combined.js
          
          # Add core-js first (provides ES2020-2025 features)
          echo "// === core-js (ES2020-2025) ===" >> patches/1-polyfills-combined.js
          cat patches/downloads/core-js.js >> patches/1-polyfills-combined.js
          echo "" >> patches/1-polyfills-combined.js
          
          # Add regenerator (async/await runtime)
          echo "// === regenerator-runtime (async/await) ===" >> patches/1-polyfills-combined.js
          cat patches/downloads/regenerator.js >> patches/1-polyfills-combined.js
          echo "" >> patches/1-polyfills-combined.js
          
          # Add promise polyfill
          echo "// === promise-polyfill ===" >> patches/1-polyfills-combined.js
          cat patches/downloads/promise.js >> patches/1-polyfills-combined.js
          echo "" >> patches/1-polyfills-combined.js
          
          # Add fetch API
          echo "// === whatwg-fetch ===" >> patches/1-polyfills-combined.js
          cat patches/downloads/fetch.js >> patches/1-polyfills-combined.js
          echo "" >> patches/1-polyfills-combined.js
          
          # Add abortcontroller
          echo "// === abortcontroller-polyfill ===" >> patches/1-polyfills-combined.js
          cat patches/downloads/abortcontroller.js >> patches/1-polyfills-combined.js
          echo "" >> patches/1-polyfills-combined.js
          
          # Add urlpattern
          echo "// === urlpattern-polyfill ===" >> patches/1-polyfills-combined.js
          cat patches/downloads/urlpattern.js >> patches/1-polyfills-combined.js
          echo "" >> patches/1-polyfills-combined.js
          
          # Add intersection-observer
          echo "// === intersection-observer ===" >> patches/1-polyfills-combined.js
          cat patches/downloads/intersection-observer.js >> patches/1-polyfills-combined.js
          echo "" >> patches/1-polyfills-combined.js
          
          # Add resize-observer
          echo "// === resize-observer-polyfill ===" >> patches/1-polyfills-combined.js
          cat patches/downloads/resize-observer.js >> patches/1-polyfills-combined.js
          echo "" >> patches/1-polyfills-combined.js
          
          # Add streams
          echo "// === web-streams-polyfill ===" >> patches/1-polyfills-combined.js
          cat patches/downloads/streams.js >> patches/1-polyfills-combined.js
          echo "" >> patches/1-polyfills-combined.js
          
          # Add structured clone
          echo "// === structured-clone-polyfill ===" >> patches/1-polyfills-combined.js
          cat patches/downloads/structured-clone.js >> patches/1-polyfills-combined.js
          echo "" >> patches/1-polyfills-combined.js
          
          # Add web-animations (420KB - for advanced animations on arena.ai)
          echo "// === web-animations-js ===" >> patches/1-polyfills-combined.js
          cat patches/downloads/web-animations.js >> patches/1-polyfills-combined.js
          echo "" >> patches/1-polyfills-combined.js
          
          # Add iOS 15 specific fixes (hand-written, not downloaded)
          cat >> patches/1-polyfills-combined.js << 'IOS15_FIXES'
          
          // === iOS 15 Specific Fixes (Hand-written) ===
          (function(global) {
              // MediaQueryList event listener fix
              if (global.MediaQueryList && !global.MediaQueryList.prototype.addEventListener) {
                  var proto = global.MediaQueryList.prototype;
                  var wrappers = new WeakMap();
                  proto.addEventListener = function(type, listener) {
                      if (type !== 'change') return;
                      if (typeof listener === 'function') {
                          proto.addListener.call(this, listener);
                      } else {
                          var wrapper = wrappers.get(listener);
                          if (!wrapper) {
                              wrapper = function(ev) { listener.handleEvent(ev); };
                              wrappers.set(listener, wrapper);
                          }
                          proto.addListener.call(this, wrapper);
                      }
                  };
                  proto.removeEventListener = function(type, listener) {
                      if (type !== 'change') return;
                      if (typeof listener === 'function') {
                          proto.removeListener.call(this, listener);
                      } else {
                          var wrapper = wrappers.get(listener);
                          if (wrapper) proto.removeListener.call(this, wrapper);
                      }
                  };
              }
              
              // CSS.supports
              if (!global.CSS) global.CSS = {};
              if (typeof CSS.supports !== 'function') {
                  CSS.supports = function(prop, value) {
                      var el = document.createElement('div');
                      if (arguments.length === 1) {
                          var pair = prop.split(':');
                          return typeof el.style[pair[0].trim()] !== 'undefined';
                      }
                      return typeof el.style[prop] !== 'undefined';
                  };
              }
              
              // requestIdleCallback
              if (typeof requestIdleCallback !== 'function') {
                  global.requestIdleCallback = function(cb) {
                      return setTimeout(function() {
                          cb({ didTimeout: false, timeRemaining: function() { return 50; } });
                      }, 1);
                  };
                  global.cancelIdleCallback = function(id) { clearTimeout(id); };
              }
              
              // reportError
              if (typeof reportError !== 'function') {
                  global.reportError = function(err) {
                      setTimeout(function() { throw err; }, 0);
                  };
              }
              
              // CustomEvent
              if (typeof CustomEvent !== 'function') {
                  global.CustomEvent = function(type, options) {
                      var ev = document.createEvent('CustomEvent');
                      ev.initCustomEvent(type, !!(options && options.bubbles), !!(options && options.cancelable), options && options.detail);
                      return ev;
                  };
              }
              
              // Element.scrollTo
              if (!Element.prototype.scrollTo) {
                  Element.prototype.scrollTo = function(x, y) {
                      if (typeof x === 'object') {
                          this.scrollLeft = x.left || 0;
                          this.scrollTop = x.top || 0;
                      } else {
                          this.scrollLeft = x || 0;
                          this.scrollTop = y || 0;
                      }
                  };
              }
              
              // structuredClone (if not already provided by polyfill)
              if (typeof structuredClone !== 'function') {
                  global.structuredClone = function(obj) {
                      return JSON.parse(JSON.stringify(obj));
                  };
              }
              
              console.log('[Combined Polyfills] All 15+ polyfills loaded successfully');
          })(window);
          IOS15_FIXES
          
          echo "========================================="
          echo "COMBINED POLYFILLS FILE CREATED"
          echo "Size: $(wc -c < patches/1-polyfills-combined.js) bytes"
          echo "========================================="

      - name: Create loader.js (initializes LegacyTranspiler)
        run: |
          cat > patches/2-loader.js << 'LOADER_EOF'
          // LegacyTranspiler loader - runs after all polyfills
          (function(){
              var iosMatch = navigator.userAgent.match(/OS (\d+)_(\d+)/);
              var iosVersion = iosMatch ? iosMatch[1] + "." + iosMatch[2] : "15.0";
              console.log("[Loader] iOS version: " + iosVersion);
              
              if (typeof window.LegacyTranspiler !== 'undefined' && window.LegacyTranspiler.init) {
                  window.LegacyTranspiler.init({
                      BASE_URL: window.location.origin,
                      runScript: function(code) {
                          try {
                              var script = document.createElement("script");
                              script.textContent = code;
                              (document.head || document.documentElement).appendChild(script);
                              script.remove();
                          } catch(e) { console.error("[Loader] Script error:", e); }
                      },
                      target: { platform: "iOS", version: iosVersion },
                      minify: true
                  });
                  console.log("[Loader] LegacyTranspiler initialized - Arena.ai ready");
              } else {
                  console.warn("[Loader] LegacyTranspiler not found");
              }
          })();
          LOADER_EOF

      - name: Copy all JS files to app bundle (ONLY 3 files total)
        run: |
          APP_NAME="Modernize"
          cp patches/1-polyfills-combined.js Payload/${APP_NAME}.app/
          cp patches/2-loader.js Payload/${APP_NAME}.app/
          cp patches/legacy-transpiler.js Payload/${APP_NAME}.app/
          echo "=== JS files in app bundle ==="
          ls -la Payload/${APP_NAME}.app/*.js
          echo "Total polyfill size: $(wc -c < Payload/${APP_NAME}.app/1-polyfills-combined.js) bytes"

      - name: Generate Swift source (injects exactly 3 scripts)
        run: |
          cat > app.swift << 'SWIFT'
          import UIKit
          import WebKit

          class ViewController: UIViewController, WKNavigationDelegate, UITextFieldDelegate, UIGestureRecognizerDelegate {
              
              var webView: WKWebView!
              var urlTextField: UITextField!
              var backButton: UIButton!
              var forwardButton: UIButton!
              var reloadButton: UIButton!
              var progressView: UIProgressView!
              var bottomToolbar: UIView!
              var bottomConstraint: NSLayoutConstraint!
              private var toolbarHidden = false
              
              override func viewDidLoad() {
                  super.viewDidLoad()
                  view.backgroundColor = UIColor.systemBackground
                  
                  setupWebView()
                  setupUI()
                  setupKeyboardHandling()
                  setupSwipeGestures()
                  
                  if let url = URL(string: "https://arena.ai") {
                      loadURL(url)
                  }
              }
              
              func setupWebView() {
                  let config = WKWebViewConfiguration()
                  config.allowsInlineMediaPlayback = true
                  config.mediaTypesRequiringUserActionForPlayback = []
                  
                  // Inject exactly 3 scripts - this is what works on iOS 15
                  // Like Firefox iOS, we combine all polyfills into ONE file [citation:7]
                  let bundle = Bundle.main
                  let jsFiles = ["1-polyfills-combined", "legacy-transpiler", "2-loader"]
                  
                  for fileName in jsFiles {
                      if let path = bundle.path(forResource: fileName, ofType: "js"),
                         let js = try? String(contentsOfFile: path, encoding: .utf8) {
                          let script = WKUserScript(source: js, injectionTime: .atDocumentStart, forMainFrameOnly: false)
                          config.userContentController.addUserScript(script)
                          print("Loaded: \(fileName).js")
                      } else {
                          print("Warning: \(fileName).js not found")
                      }
                  }
                  
                  webView = WKWebView(frame: .zero, configuration: config)
                  webView.translatesAutoresizingMaskIntoConstraints = false
                  webView.navigationDelegate = self
                  webView.allowsBackForwardNavigationGestures = true
                  view.addSubview(webView)
                  webView.addObserver(self, forKeyPath: #keyPath(WKWebView.estimatedProgress), options: .new, context: nil)
              }
              
              func setupUI() {
                  progressView = UIProgressView(progressViewStyle: .bar)
                  progressView.translatesAutoresizingMaskIntoConstraints = false
                  progressView.progressTintColor = UIColor.systemBlue
                  view.addSubview(progressView)
                  
                  bottomToolbar = UIView()
                  bottomToolbar.translatesAutoresizingMaskIntoConstraints = false
                  bottomToolbar.backgroundColor = UIColor.systemBackground
                  bottomToolbar.layer.shadowColor = UIColor.black.cgColor
                  bottomToolbar.layer.shadowOffset = CGSize(width: 0, height: -2)
                  bottomToolbar.layer.shadowOpacity = 0.1
                  view.addSubview(bottomToolbar)
                  
                  urlTextField = UITextField()
                  urlTextField.translatesAutoresizingMaskIntoConstraints = false
                  urlTextField.placeholder = "Search or enter URL"
                  urlTextField.borderStyle = .roundedRect
                  urlTextField.backgroundColor = UIColor.systemGray6
                  urlTextField.autocapitalizationType = .none
                  urlTextField.autocorrectionType = .no
                  urlTextField.keyboardType = .URL
                  urlTextField.returnKeyType = .go
                  urlTextField.delegate = self
                  urlTextField.clearButtonMode = .whileEditing
                  bottomToolbar.addSubview(urlTextField)
                  
                  let buttonStack = UIStackView()
                  buttonStack.translatesAutoresizingMaskIntoConstraints = false
                  buttonStack.axis = .horizontal
                  buttonStack.distribution = .equalSpacing
                  buttonStack.alignment = .center
                  buttonStack.spacing = 20
                  bottomToolbar.addSubview(buttonStack)
                  
                  func btn(_ name: String, _ action: Selector) -> UIButton {
                      let b = UIButton(type: .system)
                      b.setImage(UIImage(systemName: name), for: .normal)
                      b.addTarget(self, action: action, for: .touchUpInside)
                      b.tintColor = UIColor.label
                      return b
                  }
                  
                  backButton = btn("chevron.left", #selector(goBack))
                  forwardButton = btn("chevron.right", #selector(goForward))
                  reloadButton = btn("arrow.clockwise", #selector(reload))
                  
                  buttonStack.addArrangedSubview(backButton)
                  buttonStack.addArrangedSubview(forwardButton)
                  buttonStack.addArrangedSubview(reloadButton)
                  
                  NSLayoutConstraint.activate([
                      webView.topAnchor.constraint(equalTo: view.topAnchor),
                      webView.leadingAnchor.constraint(equalTo: view.leadingAnchor),
                      webView.trailingAnchor.constraint(equalTo: view.trailingAnchor),
                      webView.bottomAnchor.constraint(equalTo: bottomToolbar.topAnchor),
                      
                      progressView.topAnchor.constraint(equalTo: webView.bottomAnchor),
                      progressView.leadingAnchor.constraint(equalTo: view.leadingAnchor),
                      progressView.trailingAnchor.constraint(equalTo: view.trailingAnchor),
                      progressView.heightAnchor.constraint(equalToConstant: 2),
                      
                      bottomToolbar.leadingAnchor.constraint(equalTo: view.leadingAnchor),
                      bottomToolbar.trailingAnchor.constraint(equalTo: view.trailingAnchor),
                      bottomToolbar.heightAnchor.constraint(equalToConstant: 100),
                      
                      buttonStack.leadingAnchor.constraint(equalTo: bottomToolbar.leadingAnchor, constant: 20),
                      buttonStack.trailingAnchor.constraint(equalTo: bottomToolbar.trailingAnchor, constant: -20),
                      buttonStack.topAnchor.constraint(equalTo: bottomToolbar.topAnchor, constant: 8),
                      buttonStack.heightAnchor.constraint(equalToConstant: 44),
                      
                      urlTextField.topAnchor.constraint(equalTo: buttonStack.bottomAnchor, constant: 4),
                      urlTextField.leadingAnchor.constraint(equalTo: bottomToolbar.leadingAnchor, constant: 16),
                      urlTextField.trailingAnchor.constraint(equalTo: bottomToolbar.trailingAnchor, constant: -16),
                      urlTextField.heightAnchor.constraint(equalToConstant: 40),
                      urlTextField.bottomAnchor.constraint(equalTo: bottomToolbar.bottomAnchor, constant: -8)
                  ])
                  
                  bottomConstraint = bottomToolbar.bottomAnchor.constraint(equalTo: view.safeAreaLayoutGuide.bottomAnchor)
                  bottomConstraint.isActive = true
              }
              
              func setupSwipeGestures() {
                  let swipeUp = UISwipeGestureRecognizer(target: self, action: #selector(handleSwipeUp))
                  swipeUp.direction = .up
                  swipeUp.delegate = self
                  webView.addGestureRecognizer(swipeUp)
                  
                  let swipeDown = UISwipeGestureRecognizer(target: self, action: #selector(handleSwipeDown))
                  swipeDown.direction = .down
                  swipeDown.delegate = self
                  webView.addGestureRecognizer(swipeDown)
              }
              
              @objc func handleSwipeUp() {
                  guard !toolbarHidden else { return }
                  toolbarHidden = true
                  UIView.animate(withDuration: 0.3) {
                      self.bottomConstraint.constant = -self.bottomToolbar.bounds.height
                      self.view.layoutIfNeeded()
                  }
              }
              
              @objc func handleSwipeDown() {
                  guard toolbarHidden else { return }
                  toolbarHidden = false
                  UIView.animate(withDuration: 0.3) {
                      self.bottomConstraint.constant = 0
                      self.view.layoutIfNeeded()
                  }
              }
              
              func gestureRecognizer(_ gestureRecognizer: UIGestureRecognizer, shouldRecognizeSimultaneouslyWith otherGestureRecognizer: UIGestureRecognizer) -> Bool {
                  return true
              }
              
              func setupKeyboardHandling() {
                  NotificationCenter.default.addObserver(self, selector: #selector(keyboardWillShow), name: UIResponder.keyboardWillShowNotification, object: nil)
                  NotificationCenter.default.addObserver(self, selector: #selector(keyboardWillHide), name: UIResponder.keyboardWillHideNotification, object: nil)
                  let tap = UITapGestureRecognizer(target: self, action: #selector(dismissKeyboard))
                  tap.cancelsTouchesInView = false
                  webView.addGestureRecognizer(tap)
              }
              
              @objc func keyboardWillShow(_ notification: Notification) {
                  guard let keyboardFrame = notification.userInfo?[UIResponder.keyboardFrameEndUserInfoKey] as? CGRect else { return }
                  let duration = notification.userInfo?[UIResponder.keyboardAnimationDurationUserInfoKey] as? Double ?? 0.25
                  let curve = notification.userInfo?[UIResponder.keyboardAnimationCurveUserInfoKey] as? UInt ?? 7
                  UIView.animate(withDuration: duration, delay: 0, options: UIView.AnimationOptions(rawValue: curve << 16)) {
                      self.bottomConstraint.constant = -keyboardFrame.height + self.view.safeAreaInsets.bottom
                      self.view.layoutIfNeeded()
                  }
              }
              
              @objc func keyboardWillHide(_ notification: Notification) {
                  let duration = notification.userInfo?[UIResponder.keyboardAnimationDurationUserInfoKey] as? Double ?? 0.25
                  let curve = notification.userInfo?[UIResponder.keyboardAnimationCurveUserInfoKey] as? UInt ?? 7
                  UIView.animate(withDuration: duration, delay: 0, options: UIView.AnimationOptions(rawValue: curve << 16)) {
                      self.bottomConstraint.constant = self.toolbarHidden ? -self.bottomToolbar.bounds.height : 0
                      self.view.layoutIfNeeded()
                  }
              }
              
              @objc func dismissKeyboard() { urlTextField.resignFirstResponder() }
              
              func loadURL(_ url: URL) {
                  webView.load(URLRequest(url: url))
                  urlTextField.text = url.absoluteString
              }
              
              func loadSearch(_ query: String) {
                  let encoded = query.addingPercentEncoding(withAllowedCharacters: .urlQueryAllowed) ?? query
                  if let url = URL(string: "https://www.google.com/search?q=\(encoded)") {
                      loadURL(url)
                  }
              }
              
              @objc func goBack() { webView.goBack() }
              @objc func goForward() { webView.goForward() }
              @objc func reload() {
                  if webView.isLoading { webView.stopLoading() }
                  else { webView.reload() }
              }
              
              func textFieldShouldReturn(_ textField: UITextField) -> Bool {
                  textField.resignFirstResponder()
                  guard let text = textField.text, !text.isEmpty else { return true }
                  if text.hasPrefix("http://") || text.hasPrefix("https://") {
                      if let url = URL(string: text) { loadURL(url) }
                  } else if text.contains(".") && !text.contains(" ") {
                      if let url = URL(string: "https://\(text)") { loadURL(url) }
                  } else {
                      loadSearch(text)
                  }
                  return true
              }
              
              override func observeValue(forKeyPath keyPath: String?, of object: Any?, change: [NSKeyValueChangeKey : Any]?, context: UnsafeMutableRawPointer?) {
                  if keyPath == #keyPath(WKWebView.estimatedProgress) {
                      progressView.progress = Float(webView.estimatedProgress)
                      progressView.isHidden = webView.estimatedProgress >= 1.0
                  }
              }
              
              func webView(_ webView: WKWebView, didFinish navigation: WKNavigation!) {
                  urlTextField.text = webView.url?.absoluteString
                  backButton.isEnabled = webView.canGoBack
                  forwardButton.isEnabled = webView.canGoForward
              }
          }

          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?
              func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {
                  window = UIWindow(frame: UIScreen.main.bounds)
                  window?.rootViewController = ViewController()
                  window?.makeKeyAndVisible()
                  return true
              }
          }

          UIApplicationMain(CommandLine.argc, CommandLine.unsafeArgv, nil, NSStringFromClass(AppDelegate.self))
          SWIFT

      - name: Compile Swift
        run: |
          APP_NAME="Modernize"
          SDK=$(xcrun --sdk iphoneos --show-sdk-path)
          xcrun -sdk iphoneos swiftc -target arm64-apple-ios15.0 -framework UIKit -framework WebKit -o Payload/${APP_NAME}.app/${APP_NAME} app.swift
          chmod +x Payload/${APP_NAME}.app/${APP_NAME}

      - name: Create Info.plist
        run: |
          APP_NAME="Modernize"
          cat > Payload/${APP_NAME}.app/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
          <key>CFBundleExecutable</key><string>Modernize</string>
          <key>CFBundleIdentifier</key><string>com.modernize.browser</string>
          <key>CFBundleName</key><string>Modernize</string>
          <key>CFBundleDisplayName</key><string>Modernize</string>
          <key>CFBundlePackageType</key><string>APPL</string>
          <key>CFBundleShortVersionString</key><string>1.0</string>
          <key>CFBundleVersion</key><string>1</string>
          <key>LSRequiresIPhoneOS</key><true/>
          <key>MinimumOSVersion</key><string>15.0</string>
          <key>UIDeviceFamily</key><array><integer>1</integer><integer>2</integer></array>
          <key>UISupportedInterfaceOrientations</key><array><string>UIInterfaceOrientationPortrait</string><string>UIInterfaceOrientationLandscapeLeft</string><string>UIInterfaceOrientationLandscapeRight</string></array>
          <key>UIViewControllerBasedStatusBarAppearance</key><true/>
          <key>NSAppTransportSecurity</key><dict><key>NSAllowsArbitraryLoads</key><true/></dict>
          <key>NSMicrophoneUsageDescription</key><string>Modernize needs microphone</string>
          <key>NSCameraUsageDescription</key><string>Modernize needs camera</string>
          <key>NSPhotoLibraryUsageDescription</key><string>Modernize needs photo library</string>
          <key>UIFileSharingEnabled</key><true/>
          <key>CFBundleURLTypes</key><array><dict><key>CFBundleURLSchemes</key><array><string>modernize</string><string>http</string><string>https</string></array></dict></array>
          <key>CFBundleIcons</key><dict><key>CFBundlePrimaryIcon</key><dict><key>CFBundleIconFiles</key><array><string>Icon-60</string><string>Icon-76</string></array></dict></dict>
          </dict></plist>
          PLIST

      - name: Create PkgInfo
        run: |
          APP_NAME="Modernize"
          printf 'APPL????' > Payload/${APP_NAME}.app/PkgInfo

      - name: Create IPA
        run: |
          APP_NAME="Modernize"
          zip -r ${APP_NAME}.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Modernize-ArenaAI-Ready
          path: Modernize.ipa
